server:
  port: 8080
  forward-headers-strategy: framework
  tomcat:
    max-http-response-headers: 200
 #   threads:
 #     max: 8
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_DATABASE:newsku}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    properties:
      hibernate:
        jdbc:
          # Batch INSERTs/UPDATEs during GReader sync (issue B16). 50 is the
          # sweet spot between memory usage and round-trip reduction for
          # typical sync batches (a few hundred items per user).
          batch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
logging:
  level:
    org.springframework.boot.autoconfigure.flyway: INFO
    org.flywaydb: INFO
