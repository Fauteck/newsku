server:
 # tomcat:
 #   threads:
 #     max: 8
  port: 8080
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_DATABASE:newsku}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true

 # jpa:
 #   show-sql: true
 #   properties:
 #     hibernate:
 #       format_sql: true
logging:
  level:
    org.springframework.boot.autoconfigure.flyway: INFO
    org.flywaydb: INFO
