<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Feedteck — KI-gestützter RSS-Reader">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Feedteck">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="feedteck.svg"/>
  <link rel="icon" type="image/png" href="icons/icon-192.png"/>

  <title>Feedteck</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Re-dispatch 'change' events as 'input' so password managers (Bitwarden,
    // 1Password, etc.) that fire 'change' on autofill are picked up by Flutter.
    document.addEventListener('change', function(e) {
      if (e.target instanceof HTMLInputElement) {
        e.target.dispatchEvent(new InputEvent('input', { bubbles: true, data: e.target.value }));
      }
    }, true);

    // Polling fallback: detect value changes on autocomplete inputs that password
    // managers set directly without dispatching any DOM events (e.g. Bitwarden).
    (function() {
      var prev = new WeakMap();
      setInterval(function() {
        document.querySelectorAll('input[autocomplete]').forEach(function(el) {
          var current = el.value;
          if (prev.get(el) !== current) {
            prev.set(el, current);
            if (current) {
              el.dispatchEvent(new InputEvent('input', { bubbles: true, data: current }));
            }
          }
        });
      }, 300);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
