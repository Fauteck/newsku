<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   version="1.1"
   id="svg1"
   width="200"
   height="200"
   viewBox="0 0 200 200"
   xmlns="http://www.w3.org/2000/svg">
  <!--
    Feedteck icon: RSS-wave "F"
    The letter F is formed by three horizontal RSS arcs + a dot,
    all drawn with fill="currentColor" so AppLogo can tint it dynamically.
  -->
  <g id="feedteck-icon" fill="currentColor">
    <!-- Vertical stem of the F -->
    <rect x="20" y="20" width="28" height="160" rx="6" ry="6"/>

    <!-- Top bar of the F (full width) -->
    <rect x="20" y="20" width="120" height="28" rx="6" ry="6"/>

    <!-- Middle bar of the F (3/4 width) -->
    <rect x="20" y="86" width="88" height="28" rx="6" ry="6"/>

    <!-- RSS dot (bottom-left anchor) -->
    <circle cx="126" cy="162" r="16"/>

    <!-- RSS inner arc -->
    <path d="M 126,130 A 32,32 0 0 1 158,162" stroke="currentColor" stroke-width="16" fill="none" stroke-linecap="round"/>

    <!-- RSS outer arc -->
    <path d="M 126,98 A 64,64 0 0 1 190,162" stroke="currentColor" stroke-width="16" fill="none" stroke-linecap="round"/>
  </g>
</svg>
