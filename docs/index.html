<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsku - Self-Hosted AI RSS Reader</title>
    <meta name="description"
        content="Newsku is a self-hosted, privacy-first app that takes a bunch of RSS feeds and sort the items by importance using LLM according to the user's preference.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="container">
            <nav class="nav">
                <a href="#" class="logo">
                    <img src="assets/logo.svg" alt="Newsku Logo">
                    <span>newsku</span>
                </a>
                <div class="nav-links">
                    <a href="documentation/index.html">Documentation</a>
                    <a href="https://github.com/lamarios/newsku" target="_blank">GitHub</a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <div class="hero-content">
                    <h1 class="hero-title">Your News, <span class="highlight">Prioritized</span> by AI.</h1>
                    <p class="hero-subtitle">Stop drowning in RSS feeds. Newsku is a <strong>self-hosted</strong> RSS reader that uses LLMs to sort your items by importance based on
                        your preferences.</p>
                    <div class="cta-group">
                        <a href="https://newsku.ftpix.com" class="btn btn-primary">Try Demo</a>
                        <a href="documentation/index.html" class="btn btn-secondary">Read Docs</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="showcase">
            <div class="container">
                <div class="screenshot-wrapper">
                    <img src="assets/screenshot.png" alt="Newsku App Screenshot" class="app-screenshot">
                    <div class="glow"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Newsku. All rights reserved.</p>
            <div class="footer-links">
                <a href="https://github.com/lamarios/newsku">GitHub</a>
            </div>
        </div>
    </footer>
</body>

</html>
