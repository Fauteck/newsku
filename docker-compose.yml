services:
  newsku:
    image: ghcr.io/fauteck/newsku:latest
    container_name: newsku
    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    environment:
      TZ: Europe/Berlin
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_MODEL: "${OPENAI_MODEL}"
      OPENAI_URL: "${OPENAI_URL}"
      SALT: "${SALT}"
      ALLOW_SIGNUP: "${ALLOW_SIGNUP:-0}"
      DB_HOST: postgres-newsku
      DB_PORT: "5432"
      DB_DATABASE: "${POSTGRES_DB}"
      DB_USER: "${POSTGRES_USER}"
      DB_PASSWORD: "${POSTGRES_PASSWORD}"
      FRESHRSS_URL: "${FRESHRSS_URL}"
      ROOT_URL: "${ROOT_URL:-http://localhost:8080}"
      FRONTEND_URL: "${FRONTEND_URL}"
    expose:
      - "8080"

    depends_on:
      postgres-newsku:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    networks:
      - newsku-net
      - proxy

  postgres-newsku:
    image: postgres:18-alpine
    container_name: newsku_postgres
    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    environment:
      TZ: Europe/Berlin
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"

    volumes:
      - /srv/docker-data/newsku/postgres:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    networks:
      - newsku-net

networks:
  newsku-net:
    name: newsku-net
    driver: bridge
  proxy:
    external: true
    name: proxy
